services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quasar_swarm}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-quasar_swarm}
      USE_MOCK_DATA: ${USE_MOCK_DATA:-true}
      ZERODHA_API_KEY: ${ZERODHA_API_KEY:-}
      ZERODHA_ACCESS_TOKEN: ${ZERODHA_ACCESS_TOKEN:-}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      BAND_ENABLED: ${BAND_ENABLED:-false}
      BAND_AGENT_ID: ${BAND_AGENT_ID:-}
      BAND_API_KEY: ${BAND_API_KEY:-}
      BAND_BASE_URL: ${BAND_BASE_URL:-}
      BAND_REQUIREMENT_AGENT_ID: ${BAND_REQUIREMENT_AGENT_ID:-}
      BAND_REQUIREMENT_API_KEY: ${BAND_REQUIREMENT_API_KEY:-}
      BAND_REQUIREMENT_HANDLE: ${BAND_REQUIREMENT_HANDLE:-quasar-requirement}
      BAND_MARKET_INTEL_AGENT_ID: ${BAND_MARKET_INTEL_AGENT_ID:-}
      BAND_MARKET_INTEL_API_KEY: ${BAND_MARKET_INTEL_API_KEY:-}
      BAND_MARKET_INTEL_HANDLE: ${BAND_MARKET_INTEL_HANDLE:-quasar-market-intel}
      BAND_ARCHITECTURE_AGENT_ID: ${BAND_ARCHITECTURE_AGENT_ID:-}
      BAND_ARCHITECTURE_API_KEY: ${BAND_ARCHITECTURE_API_KEY:-}
      BAND_ARCHITECTURE_HANDLE: ${BAND_ARCHITECTURE_HANDLE:-quasar-architecture}
      BAND_RISK_AGENT_ID: ${BAND_RISK_AGENT_ID:-}
      BAND_RISK_API_KEY: ${BAND_RISK_API_KEY:-}
      BAND_RISK_HANDLE: ${BAND_RISK_HANDLE:-quasar-risk}
      BAND_DELIVERY_AGENT_ID: ${BAND_DELIVERY_AGENT_ID:-}
      BAND_DELIVERY_API_KEY: ${BAND_DELIVERY_API_KEY:-}
      BAND_DELIVERY_HANDLE: ${BAND_DELIVERY_HANDLE:-quasar-delivery}
      BAND_REVIEW_AGENT_ID: ${BAND_REVIEW_AGENT_ID:-}
      BAND_REVIEW_API_KEY: ${BAND_REVIEW_API_KEY:-}
      BAND_REVIEW_HANDLE: ${BAND_REVIEW_HANDLE:-quasar-review}
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: ./ui
    ports:
      - "8601:8501"
    volumes:
      - ./ui:/app
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  timescale_data:
