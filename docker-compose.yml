services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: quasar_swarm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quasar_swarm"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/quasar_swarm
    depends_on:
      db:
        condition: service_healthy

  ui:
    build: ./ui
    ports:
      - "8601:8501"
    volumes:
      - ./ui:/app
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

volumes:
  timescale_data:
